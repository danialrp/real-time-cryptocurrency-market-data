services:
  runtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-main
    container_name: streamer-runtime
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - streamer_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-scheduler
    container_name: streamer-scheduler
    restart: always
    env_file:
      - .env
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep scheduler || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - streamer_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-worker
    container_name: streamer-worker
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep worker || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - streamer_net

  redis:
    image: redis:7.2.8-alpine
    container_name: streamer-redis
    restart: always
    environment:
      RDSPASSWORD: '${REDIS_PASSWORD}'
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - './storage/dbdata/redis:/data'
    networks:
      - streamer_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${RDSPASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  pgsql:
    image: timescale/timescaledb:2.19.3-pg15
    container_name: streamer-pgsql
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - './storage/dbdata/pgsql:/var/lib/postgresql/data'
    networks:
      - streamer_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  streamer_net:
    driver: bridge
